<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hearts animation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: white;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            position: relative;
            overflow: hidden;
        }
        .floating-hearts {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        .heart-float {
            position: absolute;
            font-size: 3rem;
            animation: float-up 6s ease-in infinite;
            opacity: 0.8;
        }
        /* Bottom row - floats up */
        .heart-float:nth-child(1) { left: 10%; bottom: 5%; animation: float-up 6s ease-in infinite; animation-delay: 0s; }
        .heart-float:nth-child(2) { left: 30%; bottom: 10%; animation: float-up 6s ease-in infinite; animation-delay: 0.8s; }
        .heart-float:nth-child(3) { left: 50%; bottom: 8%; animation: float-up 6s ease-in infinite; animation-delay: 1.6s; }
        .heart-float:nth-child(4) { left: 70%; bottom: 12%; animation: float-up 6s ease-in infinite; animation-delay: 2.4s; }
        .heart-float:nth-child(5) { left: 90%; bottom: 6%; animation: float-up 6s ease-in infinite; animation-delay: 3.2s; }
        /* Top row - floats down */
        .heart-float:nth-child(6) { left: 20%; top: 5%; animation: float-down 6s ease-in infinite; animation-delay: 0.4s; }
        .heart-float:nth-child(7) { left: 40%; top: 8%; animation: float-down 6s ease-in infinite; animation-delay: 1.2s; }
        .heart-float:nth-child(8) { left: 60%; top: 6%; animation: float-down 6s ease-in infinite; animation-delay: 2s; }
        .heart-float:nth-child(9) { left: 80%; top: 10%; animation: float-down 6s ease-in infinite; animation-delay: 2.8s; }
        .heart-float:nth-child(10) { left: 100%; top: 4%; animation: float-down 6s ease-in infinite; animation-delay: 3.6s; }
        @keyframes float-up {
            0% { bottom: -100px; opacity: 0; transform: rotateZ(0deg); }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { bottom: calc(100vh + 100px); opacity: 0; transform: rotateZ(360deg); }
        }
        @keyframes float-down {
            0% { top: -100px; opacity: 0; transform: rotateZ(0deg); }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { top: calc(100vh + 100px); opacity: 0; transform: rotateZ(360deg); }
        }
    </style>
</head>
<body>
    <div class="floating-hearts">
        <div class="heart-float">❤️</div>
        <div class="heart-float">💕</div>
        <div class="heart-float">❤️</div>
        <div class="heart-float">💕</div>
        <div class="heart-float">❤️</div>
        <div class="heart-float">💕</div>
        <div class="heart-float">❤️</div>
        <div class="heart-float">💕</div>
        <div class="heart-float">❤️</div>
        <div class="heart-float">💕</div>
    </div>
</body>
</html>
