<!DOCTYPE html>
<html lang="en">
<head>
    <!doctype html>
    <html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>3x3 Jigsaw Puzzle</title>
        <style>
            :root{--size:360px}
            *{box-sizing:border-box}
            body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;margin:18px;background:#f7f7f9;display:flex;flex-direction:column;align-items:center;gap:12px}
            h1{margin:0;font-size:18px}
            .controls{display:flex;gap:10px;align-items:center}
            button{padding:8px 12px;border-radius:8px;border:1px solid #ccc;background:#fff;cursor:pointer}
            .play-area{width:calc(var(--size)*1.8);display:flex;gap:18px;align-items:flex-start}
            .target{width:var(--size);height:var(--size);background:#111;border-radius:12px;padding:8px;position:relative;overflow:hidden}
            .pieces-area{width:calc(var(--size)*0.8);height:var(--size);background:#fff;border-radius:12px;padding:8px;overflow:auto;display:flex;flex-wrap:wrap;align-content:flex-start;gap:8px}
            .piece{width:calc(var(--size)/3);height:calc(var(--size)/3);background-size:var(--size) var(--size);background-repeat:no-repeat;position:absolute;touch-action:none;cursor:grab;border-radius:6px;box-shadow:0 6px 18px rgba(0,0,0,0.12);transition:box-shadow .12s}
            .holding{cursor:grabbing;box-shadow:0 18px 40px rgba(0,0,0,0.22)!important}
            .pieces-list{position:relative;width:100%;height:100%}
            .status{display:flex;gap:10px;align-items:center;margin-top:6px}
            .small{font-size:13px;color:#555}
            @media (max-width:640px){:root{--size:300px}.play-area{flex-direction:column;align-items:center}}
        </style>
    </head>
    <body>
        <h1>3×3 Jigsaw Puzzle — drag pieces into place</h1>

            <div class="controls">
                <label class="small">Source image:</label>
                <img id="sourceImage" src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='900' height='900'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1'%3E%3Cstop offset='0' stop-color='%23ff8a80'/%3E%3Cstop offset='0.5' stop-color='%23ffd180'/%3E%3Cstop offset='1' stop-color='%2380d8ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100%25' height='100%25' fill='url(%23g)' /%3E%3Ctext x='120' y='480' font-size='200' fill='%23fff' font-family='Arial'%3ELOVE%3C/text%3E%3C/svg%3E" alt="source" style="height:56px;border-radius:6px;object-fit:cover">
                <div class="small">Moves: <strong id="moves">0</strong></div>
            </div>

        <div class="play-area">
            <div class="target" id="target">
                <!-- pieces will snap here -->
            </div>

            <div class="pieces-area" id="piecesArea">
                <div class="pieces-list" id="piecesList"></div>
            </div>
        </div>

        <script>
            // Click-to-place jigsaw: use the image from the <img id="sourceImage"> element.
            const SIZE = 3;
            const PIECE_TOTAL = SIZE * SIZE;
            const target = document.getElementById('target');
            const piecesList = document.getElementById('piecesList');
            const piecesArea = document.getElementById('piecesArea');
            const sourceImage = document.getElementById('sourceImage');
            const movesSpan = document.getElementById('moves');

            let pieces = []; // {el, index, correctX, correctY, placed, targetIndex}
            let selectedPiece = null; // currently selected piece for placement
            let moves = 0;

            // helper to get image src (use sourceImage.src)
            function getImageSrc(){
                return sourceImage && sourceImage.src ? sourceImage.src : null;
            }

            // default image already set in the <img> tag — use it
            function setupPieces(image){
                pieces = [];
                piecesList.innerHTML = '';
                target.innerHTML = '';

                const sizePx = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--size')) || 360;
                for(let i=0;i<PIECE_TOTAL;i++){
                    const r = Math.floor(i/SIZE), c = i%SIZE;
                    const place = document.createElement('div');
                    place.style.position = 'absolute';
                    place.style.width = `calc(var(--size)/3)`;
                    place.style.height = `calc(var(--size)/3)`;
                    place.style.left = `${(c*(100/3))}%`;
                    place.style.top = `${(r*(100/3))}%`;
                    place.style.boxSizing = 'border-box';
                    place.dataset.index = i;
                    place.addEventListener('click', onTargetClick);
                    target.appendChild(place);
                }

                for(let i=0;i<PIECE_TOTAL;i++){
                    const r = Math.floor(i/SIZE), c = i%SIZE;
                    const el = document.createElement('div');
                    el.className = 'piece';
                    el.dataset.index = i;
                    el.style.width = `calc(var(--size)/3)`;
                    el.style.height = `calc(var(--size)/3)`;
                    el.style.backgroundImage = `url(${image})`;
                    el.style.backgroundSize = `var(--size) var(--size)`;
                    el.style.backgroundPosition = `-${c*100/3}% -${r*100/3}%`;
                    el.style.position = 'absolute';
                    el.style.clipPath = generateClipPath(i);
                    el.addEventListener('click', onPieceClick);

                    piecesList.appendChild(el);

                    const targetRect = {x: c*(sizePx/3), y: r*(sizePx/3)};
                    pieces.push({el, index:i, correctX: targetRect.x, correctY: targetRect.y, placed:false, targetIndex:null});
                }

                positionPiecesShuffled();
            }

            function onPieceClick(e){
                const el = e.currentTarget;
                const idx = Number(el.dataset.index);
                const piece = pieces[idx];
                if(piece.placed) return; // cannot select already placed piece
                // toggle selection
                if(selectedPiece === piece){
                    selectedPiece = null;
                    el.classList.remove('holding');
                } else {
                    // clear previous selection style
                    if(selectedPiece) selectedPiece.el.classList.remove('holding');
                    selectedPiece = piece;
                    el.classList.add('holding');
                }
            }

            function onTargetClick(e){
                const place = e.currentTarget;
                const index = Number(place.dataset.index);
                if(!selectedPiece) return; // nothing selected

                // find if a piece already occupies this target
                const occupant = pieces.find(p => p.targetIndex === index);
                if(occupant){
                    // swap: move occupant back to piecesList area (random spot)
                    occupant.placed = false; occupant.targetIndex = null;
                    piecesList.appendChild(occupant.el);
                    randomizePosition(occupant.el);
                }

                // place selectedPiece into this target
                const p = selectedPiece;
                p.placed = true; p.targetIndex = index;
                // position inside target
                p.el.style.left = (p.correctX) + 'px';
                p.el.style.top = (p.correctY) + 'px';
                p.el.style.position = 'absolute';
                target.appendChild(p.el);

                // clear selection style
                p.el.classList.remove('holding'); selectedPiece = null;
                moves++; movesSpan.textContent = moves;
                checkWin();
            }

            function generateClipPath(i){
                const shapes = [
                    'polygon(10% 0%, 90% 0%, 100% 30%, 100% 70%, 90% 100%, 10% 100%, 0% 70%, 0% 30%)',
                    'polygon(0% 10%, 30% 0%, 70% 0%, 100% 10%, 90% 90%, 10% 90%)',
                    'polygon(0% 0%, 100% 0%, 100% 60%, 80% 100%, 20% 100%, 0% 60%)',
                    'polygon(0% 20%, 20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%)'
                ];
                return shapes[i % shapes.length];
            }

            function positionPiecesShuffled(){
                const listRect = piecesList.getBoundingClientRect();
                const pw = listRect.width || (parseInt(getComputedStyle(document.documentElement).getPropertyValue('--size'))*0.8);
                const ph = listRect.height || (parseInt(getComputedStyle(document.documentElement).getPropertyValue('--size')) || 360);
                const margin = 8;
                pieces.forEach((p, idx)=>{
                    p.placed = false; p.targetIndex = null;
                    const x = Math.random()*(pw - pw/3 - margin*2) + margin;
                    const y = Math.random()*(ph - ph/3 - margin*2) + margin;
                    p.el.style.left = x + 'px';
                    p.el.style.top = y + 'px';
                    p.el.style.zIndex = 10 + idx;
                    piecesList.appendChild(p.el);
                });
            }

            function randomizePosition(el){
                const listRect = piecesList.getBoundingClientRect();
                const pw = listRect.width || (parseInt(getComputedStyle(document.documentElement).getPropertyValue('--size'))*0.8);
                const ph = listRect.height || (parseInt(getComputedStyle(document.documentElement).getPropertyValue('--size')) || 360);
                const margin = 8;
                const x = Math.random()*(pw - pw/3 - margin*2) + margin;
                const y = Math.random()*(ph - ph/3 - margin*2) + margin;
                el.style.left = x + 'px'; el.style.top = y + 'px';
            }

            function checkWin(){
                if(pieces.every(p=>p.placed)){
                    setTimeout(()=> alert('Congratulations! Puzzle completed in ' + moves + ' moves.'),100);
                }
            }

            function shuffle(){
                pieces.forEach((p,idx)=>{ p.placed=false; p.targetIndex=null; piecesList.appendChild(p.el); });
                positionPiecesShuffled(); moves=0; movesSpan.textContent=moves;
            }

            function reset(){
                pieces.forEach((p,idx)=>{
                    p.placed = true; p.targetIndex = idx; p.el.style.position='absolute'; p.el.style.left = p.correctX + 'px'; p.el.style.top = p.correctY + 'px'; target.appendChild(p.el);
                });
                moves=0; movesSpan.textContent=moves;
            }

            // initialize using the <img> src (start shuffled)
            setupPieces(getImageSrc());
            window.addEventListener('resize', ()=> positionPiecesShuffled());
        </script>
    </body>
    </html>
